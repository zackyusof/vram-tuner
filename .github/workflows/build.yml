name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VRAMTuner
    runs-on: macos-latest
    strategy:
      matrix:
        swift-version: ['5.9']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift
        run: |
          swift --version
          which swift

      - name: Build
        run: swift build -c release -v

      - name: Verify binary
        run: |
          ls -lh .build/release/VRAMTuner
          file .build/release/VRAMTuner
          .build/release/VRAMTuner --version 2>&1 || true

      - name: Create app bundle
        run: |
          mkdir -p VRAMTuner.app/Contents/MacOS
          mkdir -p VRAMTuner.app/Contents/Resources
          cp .build/release/VRAMTuner VRAMTuner.app/Contents/MacOS/
          chmod +x VRAMTuner.app/Contents/MacOS/VRAMTuner
          cat > VRAMTuner.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>VRAMTuner</string>
            <key>CFBundleIdentifier</key><string>com.local.vramtuner</string>
            <key>CFBundleName</key><string>VRAMTuner</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Test app bundle
        run: |
          ls -lh VRAMTuner.app/Contents/MacOS/VRAMTuner
          file VRAMTuner.app/Contents/MacOS/VRAMTuner

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VRAMTuner-macos
          path: VRAMTuner.app
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: VRAMTuner-macos

      - name: Create app zip
        run: |
          zip -r VRAMTuner.zip VRAMTuner.app
          ls -lh VRAMTuner.zip

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: VRAMTuner.zip
          draft: false
          prerelease: false
          body: |
            # VRAMTuner Release

            ## Installation

            ```bash
            unzip VRAMTuner.zip
            mv VRAMTuner.app /Applications/
            ```

            ## Features
            - GPU memory allocation control
            - Menu bar integration
            - Auto-recommended settings
            - Persistent configuration
            - Zero dependencies

            ## System Requirements
            - macOS 13.0+ (Ventura+)
            - Apple Silicon (M1/M2/M3/M4)

            Built with Swift 5.9+

  lint:
    name: Lint & Validate
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Swift syntax
        run: |
          swift build --show-bin-path
          find Sources -name "*.swift" | wc -l

      - name: Validate package
        run: |
          swift package describe
          swift package resolve

      - name: Build debug
        run: swift build
